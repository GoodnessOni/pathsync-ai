# PathSync AI — Render Deployment Config
# Deploy at: https://render.com → New → Blueprint

services:
  # ── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: pathsync-ai-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter          # Upgrade to standard for production
    region: oregon
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false        # Set manually in Render dashboard
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: '["https://pathsync-ai-frontend.onrender.com"]'
    healthCheckPath: /api/v1/health
    autoDeploy: true

  # ── Frontend (Static Site) ─────────────────────────────────────────────────
  - type: web
    name: pathsync-ai-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://pathsync-ai-backend.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
